<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Virtual</title>

    <!--LINK PRA ADICIONAR O FAVICON-->
    <link rel="shortcut icon" href="imagens/icones/favicon.ico" type="image/x-icon">

    <!--LINK PARA O ARQUIVO-->
    <link rel="stylesheet" href="../css/style_estrutura_paginas.css">
    <link rel="stylesheet" href="../css/style_formulario.css">
</head>

<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                <a href="index.html">
                    <img src="../imagens/icones/logo.png" alt="logo">
                </a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="index.html" class="lnk_menu"> Home</a></li>
                    <li><a href="../paginas/cadastro.html" class="lnk_menu"> Cadastro</a></li>
                    <li><a href="../paginas/sobre.html" class="lnk_menu"> Sobre</a></li>

                </ul>
            </nav>

            <div id="div-icones">
                <ul>
                    <li><a href="../paginas/login.html" class="lnk_icone"><img src="../imagens/icones/login.png"></a></li>
                    <li><a href="../paginas/carrinho.html" class="lnk_icone"><img src="../imagens/icones/carrinho.png"
                                alt=""></a></li>
                </ul>
            </div>
        </header>

        <section id="formulario">
            <h3>Cadastro</h3>

            <form id="form-pessoa">
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome" class="input01" required maxlenght="68"
                    placeholder="Digite seu nome">

                <label for="cpf">CPF</label>
                <input type="text" name="cpf" id="cpf" class="input02" required maxlenght="14"
                    placeholder="Digite seu CPF">

                <label for="data-nascimento">Nascimento</label>
                <input type="text" name="nascimento" id="nascimento" class="input02" required
                    placeholder="Digite sua data de nascimento">

                <div id="div-dados-endereco" class="oculto">
                    <label for="logradouro">Logradouro</label>
                    <input type="text" name="logradouro" id="logradouro" class="input01">

                    <label for="num-residencia">Número</label>
                    <input type="text" name="numero" id="numero" class="input01">

                    <label for="num-residencia">Número</label>
                    <input type="text" name="logradouro" id="logradouro" class="input02" maxlength="10"
                        placeholder="Digite o número da residência" required>

                    <label for="complemento-end">complemento</label>
                    <input type="text" name="complemento-end" id="complemento-end" class="input01">

                    <label for="bairro">Bairro</label>
                    <input type="text" name="bairro" id="bairro" class="input01">

                    <label for="localidade">localidade</label>
                    <input type="text" name="localidade" id="localidade" class="input01">

                    <label for="uf">uf</label>
                    <input type="text" name="uf" id="uf" class="input02">

                </div>

                <label for="senha"></label>
                <input type="password" name="senha" id="senha" class="input02" required maxlenght="6"
                    placeholder="Informe a senha">

                <div id="div-btns">
                    <button type="submit" id="btn-add">Cadastrar</button>
                    <button type="reset" id="btn-limpar">Limpar</button>
                </div>

            </form>
        </section>

        <footer id="rodape">
            <div id="dadosloja">
                <h2>Rua Pedregulho Quente, 6731</h2>
                <h1>Aracaju - Sergipe</h1>
            </div>

            <div id="div-cartoes">
                <img src="imagens/icones/hipercard.png" alt="Hipercard">
                <img src="imagens/icones/visa.png" alt="Visa">
                <img src="imagens/icones/master_card.png" alt="Mastercard">
            </div>
        </footer>
    </main>

</body>

</html>
