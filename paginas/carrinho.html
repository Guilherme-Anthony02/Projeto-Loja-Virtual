<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Virtual</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="../imagens/icones/favicon.ico" type="image/x-icon">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style_estrutura_paginas.css">
    <link rel="stylesheet" href="../css/style_carrinho.css">

    <!-- JS -->
    <script type="module" src="../js/montaTelaCarrinho.js" defer></script>
</head>

<body>

    <main id="geral">

        <header id="cabecalho">

            <div id="logo">
                <a href="../index.html">
                    <img src="../imagens/icones/logo.png" alt="Logo">
                </a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html" class="lnk_menu">Home</a></li>
                    <li><a href="../paginas/cadastro.html" class="lnk_menu">Cadastro</a></li>
                    <li><a href="../paginas/sobre.html" class="lnk_menu">Sobre</a></li>
                </ul>
            </nav>

            <div id="div-icones">
                <ul>
                    <li>
                        <a href="../paginas/login.html" class="lnk_icone">
                            <img src="../imagens/icones/login.png" alt="Login">
                        </a>
                    </li>

                    <li>
                        <a href="../paginas/carrinho.html" class="lnk_icone">
                            <img src="../imagens/icones/carrinho.png" alt="Carrinho">
                        </a>
                    </li>
                </ul>
            </div>

        </header>

       
        <section class="carrinho">

            <div class="container">

                <h1>Seu Carrinho</h1>

                <br>

                <h2>Aproveite as ofertas e adicione ao seu carrinho!</h2>

                <div class="carrinho-container">

                    <!-- PRODUTOS DO CARRINHO -->
                    <section id="itens-carrinho" class="produtos-lista">

                       

                    </section>

                    <div class="resumo-carrinho">

                        <h3>Resumo do Pedido</h3>

                        <hr>

                        <div class="resumo-linha">
                            <p>Subtotal:</p>
                            <p id="subtotal">R$ 0,00</p>
                        </div>

                        <div class="cep">
                            <p>Digite seu CEP</p>
                            <input type="text" placeholder="Ex: 49010-390">
                        </div>

                        <div class="resumo-linha">
                            <p>Frete (Taxa Fixa)</p>
                            <p id="taxa-frete">R$15,00</p>
                            
                        </div>

                        <hr>

                        <div class="resumo-linha total">
                            <p>Total:</p>
                            <p id="total">R$ </p>
                        </div>

                        <button class="btn-finalizar">
                            Finalizar Compra
                        </button>

                    </div>

                </div>

            </div>

        </section>

        <!-- RODAPÉ -->
        <footer id="rodape">

            <div id="dadosloja">
                <h2>Rua José do Prado Franco, 458</h2>
                <h3>Centro, Aracaju - SE</h3>
                <h4>CEP: 49010-390</h4>
            </div>

            <div id="div-cartoes">
                <img src="../imagens/icones/hipercard.png" alt="Hipercard">
                <img src="../imagens/icones/visa.png" alt="Visa">
                <img src="../imagens/icones/master_card.png" alt="Mastercard">
            </div>

        </footer>

    </main>

</body>

</html>
